# =====================================================
#  Apache Virtual Host — Reverse Proxy til Node.js
#  Kopier dette til: xampp/apache/conf/extra/httpd-vhosts.conf
# =====================================================

# VIGTIGT: Aktiver disse moduler i httpd.conf først:
#   LoadModule proxy_module modules/mod_proxy.so
#   LoadModule proxy_http_module modules/mod_proxy_http.so
#   LoadModule rewrite_module modules/mod_rewrite.so

<VirtualHost *:80>
    ServerName ditdomæne.dk
    ServerAlias www.ditdomæne.dk

    # Reverse proxy til Node.js app
    ProxyPreserveHost On
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # Logging
    ErrorLog "logs/mit-site-error.log"
    CustomLog "logs/mit-site-access.log" combined

    # Timeout settings (undgå 502 errors)
    ProxyTimeout 300
    ProxyBadHeader Ignore
</VirtualHost>
